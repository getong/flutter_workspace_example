<div class="w-10 h-10 rounded-full overflow-hidden hover:scale-105 transition-transform cursor-pointer border-2 border-primary-container">

</div>
</div>
<div class="absolute bottom-1 right-1 bg-primary text-on-primary w-10 h-10 rounded-full flex items-center justify-center border-4 border-white shadow-lg cursor-pointer active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm" data-icon="edit">edit</span>
</div>

<!-- Stats Bento-ish Grid -->

<div class="bg-surface-container-low p-6 rounded-xl flex flex-col items-center justify-center">
<span class="text-2xl font-bold text-primary">124</span>
<span class="text-[11px] font-medium tracking-wide uppercase text-on-surface-variant">Contacts</span>
</div>
<div class="bg-surface-container-low p-6 rounded-xl flex flex-col items-center justify-center">

</div>

<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>

<button class="w-full flex items-center justify-between p-5 hover:bg-surface-container-low transition-colors group">

<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</div>
<span class="font-semibold text-on-surface">Notifications</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-5 hover:bg-surface-container-low transition-colors group">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-xl bg-teal-50 text-teal-600 flex items-center justify-center group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined" data-icon="help">help</span>
</div>
<span class="font-semibold text-on-surface">Help</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant" data-icon="chevron_right">chevron_right</span>

<span class="material-symbols-outlined mb-1" data-icon="group">group</span>

<span class="text-[11px] font-medium tracking-wide uppercase font-inter">Profile</span>
</a>
